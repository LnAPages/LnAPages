name = "lnapages"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# Recurring expenses cron: Cloudflare Pages Functions do not support scheduled
# triggers natively. To automate recurring expense processing, create a separate
# Cloudflare Worker that runs on a daily cron and POSTs to:
#   POST /api/admin/expenses/process-recurring
# with a valid admin session cookie + CSRF token. Alternatively, call the
# endpoint manually from the admin UI.

[[d1_databases]]
binding = "LNAPAGES_DB"
database_name = "lnapages"
database_id = "f6f4f30a-ec78-4f76-98a4-9f51445afe73"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "LNAPAGES_GALLERY"
bucket_name = "lnapages-gallery"

[[kv_namespaces]]
binding = "LNAPAGES_CONFIG"
id = "e776936711fe4c91a9e31a89534732de"

[vars]
APP_URL = "https://lnapages.pages.dev"
R2_PUBLIC_BASE_URL = "https://pub-5867157fecae45cd9f83f7f4543499ad.r2.dev"
GITHUB_REPO_OWNER = "LnAPages"
